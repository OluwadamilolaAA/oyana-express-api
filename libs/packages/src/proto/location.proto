syntax = "proto3";

package location;

import "google/protobuf/timestamp.proto";

service LocationService {
  rpc UpdateDriverLocation (UpdateDriverLocationRequest) returns (UpdateDriverLocationResponse);
  rpc GetDriverLocation (GetDriverLocationRequest) returns (GetDriverLocationResponse);
  rpc FindNearbyDrivers (FindNearbyDriversRequest) returns (FindNearbyDriversResponse);
  rpc StartTrackingSession (StartTrackingSessionRequest) returns (StartTrackingSessionResponse);
  rpc AppendTripLocation (AppendTripLocationRequest) returns (AppendTripLocationResponse);
  rpc GetTripRoute (GetTripRouteRequest) returns (GetTripRouteResponse);
}

message DriverLocation {
  string id = 1;
  string driverId = 2;
  double latitude = 3;
  double longitude = 4;
  optional double heading = 5;
  optional double speedKph = 6;
  optional double accuracyMeters = 7;
  string onlineState = 8;
  google.protobuf.Timestamp recordedAt = 9;
}

message TripLocationPoint {
  string id = 1;
  string tripId = 2;
  string serviceType = 3;
  double latitude = 4;
  double longitude = 5;
  optional double heading = 6;
  optional double speedKph = 7;
  google.protobuf.Timestamp recordedAt = 8;
}

message TrackingSession {
  string id = 1;
  string serviceType = 2;
  string tripId = 3;
  string driverId = 4;
  string status = 5;
  google.protobuf.Timestamp startedAt = 6;
  google.protobuf.Timestamp endedAt = 7;
}

message NearbyDriver {
  string driverId = 1;
  double latitude = 2;
  double longitude = 3;
  double distanceMeters = 4;
  optional string vehicleType = 5;
  optional string availabilityStatus = 6;
}

message UpdateDriverLocationRequest {
  DriverLocation location = 1;
}

message UpdateDriverLocationResponse {
  DriverLocation location = 1;
}

message GetDriverLocationRequest {
  string driverId = 1;
}

message GetDriverLocationResponse {
  DriverLocation location = 1;
}

message FindNearbyDriversRequest {
  double latitude = 1;
  double longitude = 2;
  optional string serviceType = 3;
  optional string vehicleType = 4;
  optional double radiusMeters = 5;
}

message FindNearbyDriversResponse {
  repeated NearbyDriver drivers = 1;
}

message StartTrackingSessionRequest {
  string serviceType = 1;
  string tripId = 2;
  string driverId = 3;
}

message StartTrackingSessionResponse {
  TrackingSession session = 1;
}

message AppendTripLocationRequest {
  TripLocationPoint point = 1;
}

message AppendTripLocationResponse {
  TripLocationPoint point = 1;
}

message GetTripRouteRequest {
  string tripId = 1;
  string serviceType = 2;
}

message GetTripRouteResponse {
  TrackingSession session = 1;
  repeated TripLocationPoint points = 2;
}